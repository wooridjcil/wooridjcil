<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리동작 웹진</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f2f4f8;
      text-align: center;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .guide {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .webzine-list {
      display: grid;
      gap: 16px;
    }

    .webzine-card {
      display: block;
      background: white;
      padding: 24px;
      border-radius: 20px;
      text-decoration: none;
      color: #222;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .webzine-card strong {
      display: block;
      font-size: 24px;
      margin-bottom: 8px;
      color: #1f3c88;
    }

    .webzine-card span {
      font-size: 16px;
      color: #555;
    }

    .webzine-card:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>우리동작 웹진</h1>
    <p class="guide">
      보고 싶은 웹진 호수를 선택해주세요.
    </p>

    <div class="webzine-list">
      <a href="vol26/index.html" class="webzine-card">
        <strong>제26호 우리동작 웹진</strong>
        <span>2026년 3·4월 소식 보기</span>
      </a>

      <a href="vol25/index.html" class="webzine-card">
        <strong>제25호 우리동작 웹진</strong>
        <span>2026년 1·2월 소식 보기</span>
      </a>
    </div>
  </div>
</body>
</html>
